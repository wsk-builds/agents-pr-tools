name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

      - name: Smoke test CLI help
        run: node src/cli.mjs --help >/dev/null
